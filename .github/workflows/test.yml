name: API Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        env:
          REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}
        run: npm test

      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Jest Results
          path: reports/junit.xml
          reporter: jest-junit
