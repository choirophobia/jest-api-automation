name: API Tests

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # 06:00 WIB (UTC+7) every day
    - cron: '0 23 * * *'
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      total: ${{ steps.summary.outputs.total }}
      passed: ${{ steps.summary.outputs.passed }}
      failed: ${{ steps.summary.outputs.failed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        env:
          REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}
        run: npm test

      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Jest Results
          path: reports/junit.xml
          reporter: jest-junit

      - name: Extract test summary
        id: summary
        if: always()
        run: |
          if [ -f reports/junit.xml ]; then
            TOTAL=$(grep -oP 'tests="\K[0-9]+' reports/junit.xml | head -1)
            FAILURES=$(grep -oP 'failures="\K[0-9]+' reports/junit.xml | head -1)
            ERRORS=$(grep -oP 'errors="\K[0-9]+' reports/junit.xml | head -1)
          else
            TOTAL=0; FAILURES=0; ERRORS=0
          fi
          FAILED=$((FAILURES + ERRORS))
          PASSED=$((TOTAL - FAILED))
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"

  notify:
    needs: test
    runs-on: ubuntu-latest
    if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ "${{ needs.test.result }}" = "success" ]; then EMOJI="✅"; else EMOJI="❌"; fi
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"${EMOJI} Daily API Tests: **${{ needs.test.result }}**\nTotal: ${{ needs.test.outputs.total }} | Passed: ${{ needs.test.outputs.passed }} | Failed: ${{ needs.test.outputs.failed }}\"}"
